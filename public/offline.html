<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0D0D0F" />
    <title>OPEN · Sin conexión</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0D0D0F;
        color: #FAFAFA;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 2rem;
      }
      .logo {
        font-size: 2.5rem;
        font-weight: 900;
        letter-spacing: -0.04em;
        margin-bottom: 1.5rem;
        color: #FAFAFA;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
        color: #FAFAFA;
      }
      p {
        font-size: 0.875rem;
        color: #888;
        max-width: 22rem;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      button {
        background: #FAFAFA;
        color: #0D0D0F;
        border: none;
        padding: 0.75rem 2rem;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.02em;
      }
      button:hover { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div>
      <div class="logo">OPEN</div>
      <h1>Sin conexión</h1>
      <p>No hay conexión a internet en este momento. Revisa tu red y vuelve a intentar.</p>
      <button onclick="window.location.reload()">Reintentar</button>
    </div>
  </body>
</html>
